<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conway's Game of Life — Lossfunk Verifier</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0c0c0f;
    color: #e8e4df;
    font-family: 'Segoe UI', system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }
  h1 {
    font-size: 1.6rem;
    margin-bottom: 6px;
    color: #e05a3a;
  }
  .subtitle {
    font-size: 0.85rem;
    color: #888;
    margin-bottom: 16px;
  }
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
    margin-bottom: 12px;
    justify-content: center;
  }
  button, select, input[type=text] {
    background: #1e1e24;
    color: #e8e4df;
    border: 1px solid #333;
    padding: 6px 14px;
    border-radius: 4px;
    font-size: 0.85rem;
    cursor: pointer;
    transition: background 0.15s;
  }
  button:hover { background: #2a2a32; }
  button:active { background: #e05a3a; }
  button.active { background: #e05a3a; border-color: #e05a3a; }
  select { cursor: pointer; }
  input[type=text] { width: 240px; cursor: text; }
  label { font-size: 0.8rem; color: #aaa; }
  .row { display: flex; gap: 8px; align-items: center; }
  .speed-control { display: flex; align-items: center; gap: 6px; }
  .speed-control input[type=range] {
    width: 100px;
    accent-color: #e05a3a;
  }
  canvas {
    border: 1px solid #333;
    cursor: crosshair;
    image-rendering: pixelated;
  }
  .info-bar {
    display: flex;
    gap: 20px;
    margin-top: 10px;
    font-size: 0.85rem;
    color: #aaa;
  }
  .info-bar span { color: #d4a853; font-weight: 600; }
  .status {
    margin-top: 8px;
    font-size: 0.8rem;
    color: #888;
    min-height: 1.2em;
    text-align: center;
  }
  .status.error { color: #e05a3a; }
  .status.success { color: #4caf50; }
  .separator {
    width: 1px;
    height: 24px;
    background: #333;
  }
  .api-row {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
  }
</style>
</head>
<body>

<h1>Conway's Game of Life</h1>
<p class="subtitle">Connected Still Life Verifier &amp; Simulator</p>

<div class="controls">
  <div class="row">
    <button id="btnStep" title="Advance one generation">Step</button>
    <button id="btnPlay" title="Play / Pause">Play</button>
    <button id="btnClear" title="Clear the grid">Clear</button>
    <div class="separator"></div>
    <div class="speed-control">
      <label>Speed</label>
      <input type="range" id="speedSlider" min="1" max="60" value="10">
      <label id="speedLabel">10 fps</label>
    </div>
  </div>
</div>

<div class="controls">
  <div class="api-row">
    <label>Grid size:</label>
    <select id="selInstance">
      <option value="8">8 × 8</option>
      <option value="10">10 × 10</option>
      <option value="16">16 × 16</option>
      <option value="20" selected>20 × 20</option>
      <option value="32">32 × 32</option>
    </select>
    <button id="btnResize">Resize</button>
    <div class="separator"></div>
    <label>API:</label>
    <input type="text" id="apiUrl" value="http://168.144.71.199:8080" placeholder="http://host:port">
    <button id="btnLoad">Load from Leaderboard</button>
  </div>
</div>

<canvas id="grid"></canvas>

<div class="info-bar">
  <div>Generation: <span id="genCount">0</span></div>
  <div>Live cells: <span id="cellCount">0</span></div>
  <div>Density: <span id="density">0.0%</span></div>
  <div>Stable: <span id="stableStatus">—</span></div>
  <div>Connected: <span id="connStatus">—</span></div>
</div>

<p class="status" id="status">Click cells to toggle. Load a submission from the leaderboard or draw your own pattern.</p>

<script>
const canvas = document.getElementById('grid');
const ctx = canvas.getContext('2d');

let N = 20;
let CELL_SIZE = 24;
let grid = [];
let generation = 0;
let playing = false;
let animId = null;
let lastFrame = 0;
let fps = 10;
let painting = false;
let paintValue = 1;

const COLORS = {
  bg: '#111118',
  dead: '#16161a',
  alive: '#e05a3a',
  aliveAlt: '#d4a853',
  gridLine: '#222228',
  hover: 'rgba(224,90,58,0.25)',
};

// ── Grid helpers ─────────────────────────────────────────────

function makeGrid(n) {
  return Array.from({length: n}, () => Array(n).fill(0));
}

function initGrid(n) {
  N = n;
  CELL_SIZE = Math.max(4, Math.min(28, Math.floor(640 / N)));
  canvas.width = N * CELL_SIZE;
  canvas.height = N * CELL_SIZE;
  grid = makeGrid(N);
  generation = 0;
  playing = false;
  document.getElementById('btnPlay').textContent = 'Play';
  document.getElementById('btnPlay').classList.remove('active');
  updateInfo();
  draw();
}

function countLive() {
  let c = 0;
  for (let r = 0; r < N; r++)
    for (let k = 0; k < N; k++)
      c += grid[r][k];
  return c;
}

function countNeighbors(r, c) {
  let nb = 0;
  for (let dr = -1; dr <= 1; dr++)
    for (let dc = -1; dc <= 1; dc++) {
      if (dr === 0 && dc === 0) continue;
      const nr = r + dr, nc = c + dc;
      if (nr >= 0 && nr < N && nc >= 0 && nc < N)
        nb += grid[nr][nc];
    }
  return nb;
}

function stepGrid() {
  const next = makeGrid(N);
  for (let r = 0; r < N; r++)
    for (let c = 0; c < N; c++) {
      const nb = countNeighbors(r, c);
      if (grid[r][c] === 1)
        next[r][c] = (nb === 2 || nb === 3) ? 1 : 0;
      else
        next[r][c] = (nb === 3) ? 1 : 0;
    }
  grid = next;
  generation++;
}

function isStable() {
  for (let r = 0; r < N; r++)
    for (let c = 0; c < N; c++) {
      const nb = countNeighbors(r, c);
      if (grid[r][c] === 1 && nb !== 2 && nb !== 3) return false;
      if (grid[r][c] === 0 && nb === 3) return false;
    }
  return true;
}

function isConnected() {
  let start = null;
  const live = new Set();
  for (let r = 0; r < N; r++)
    for (let c = 0; c < N; c++)
      if (grid[r][c] === 1) {
        live.add(r * N + c);
        if (!start) start = [r, c];
      }
  if (live.size === 0) return false;
  const visited = new Set();
  const queue = [start];
  visited.add(start[0] * N + start[1]);
  while (queue.length) {
    const [r, c] = queue.shift();
    for (let dr = -1; dr <= 1; dr++)
      for (let dc = -1; dc <= 1; dc++) {
        if (dr === 0 && dc === 0) continue;
        const nr = r + dr, nc = c + dc;
        const key = nr * N + nc;
        if (nr >= 0 && nr < N && nc >= 0 && nc < N && live.has(key) && !visited.has(key)) {
          visited.add(key);
          queue.push([nr, nc]);
        }
      }
  }
  return visited.size === live.size;
}

// ── Drawing ──────────────────────────────────────────────────

function draw() {
  ctx.fillStyle = COLORS.bg;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  for (let r = 0; r < N; r++)
    for (let c = 0; c < N; c++) {
      const x = c * CELL_SIZE;
      const y = r * CELL_SIZE;
      if (grid[r][c] === 1) {
        ctx.fillStyle = COLORS.alive;
        ctx.fillRect(x + 1, y + 1, CELL_SIZE - 2, CELL_SIZE - 2);
      } else {
        ctx.fillStyle = COLORS.dead;
        ctx.fillRect(x + 1, y + 1, CELL_SIZE - 2, CELL_SIZE - 2);
      }
    }
}

function updateInfo() {
  const live = countLive();
  document.getElementById('genCount').textContent = generation;
  document.getElementById('cellCount').textContent = live;
  document.getElementById('density').textContent = (live / (N * N) * 100).toFixed(1) + '%';

  if (live === 0) {
    document.getElementById('stableStatus').textContent = '—';
    document.getElementById('stableStatus').style.color = '#888';
    document.getElementById('connStatus').textContent = '—';
    document.getElementById('connStatus').style.color = '#888';
  } else {
    const stable = isStable();
    document.getElementById('stableStatus').textContent = stable ? 'YES' : 'NO';
    document.getElementById('stableStatus').style.color = stable ? '#4caf50' : '#e05a3a';
    const conn = isConnected();
    document.getElementById('connStatus').textContent = conn ? 'YES' : 'NO';
    document.getElementById('connStatus').style.color = conn ? '#4caf50' : '#e05a3a';
  }
}

// ── Animation loop ───────────────────────────────────────────

function animate(ts) {
  if (!playing) return;
  const interval = 1000 / fps;
  if (ts - lastFrame >= interval) {
    const wasBefore = grid.map(r => r.slice());
    stepGrid();
    // Check if grid stopped changing
    let same = true;
    for (let r = 0; r < N && same; r++)
      for (let c = 0; c < N && same; c++)
        if (grid[r][c] !== wasBefore[r][c]) same = false;
    draw();
    updateInfo();
    lastFrame = ts;
    if (same) {
      playing = false;
      document.getElementById('btnPlay').textContent = 'Play';
      document.getElementById('btnPlay').classList.remove('active');
      setStatus('Pattern is stable (no changes). Paused.', 'success');
      return;
    }
  }
  animId = requestAnimationFrame(animate);
}

function setStatus(msg, cls) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status' + (cls ? ' ' + cls : '');
}

// ── Mouse interaction ────────────────────────────────────────

function getCellFromEvent(e) {
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  const c = Math.floor(x / CELL_SIZE);
  const r = Math.floor(y / CELL_SIZE);
  if (r >= 0 && r < N && c >= 0 && c < N) return [r, c];
  return null;
}

canvas.addEventListener('mousedown', (e) => {
  const cell = getCellFromEvent(e);
  if (!cell) return;
  painting = true;
  const [r, c] = cell;
  paintValue = grid[r][c] === 1 ? 0 : 1;
  grid[r][c] = paintValue;
  draw();
  updateInfo();
});

canvas.addEventListener('mousemove', (e) => {
  if (!painting) return;
  const cell = getCellFromEvent(e);
  if (!cell) return;
  const [r, c] = cell;
  grid[r][c] = paintValue;
  draw();
  updateInfo();
});

window.addEventListener('mouseup', () => { painting = false; });

// ── Button handlers ──────────────────────────────────────────

document.getElementById('btnStep').addEventListener('click', () => {
  if (playing) {
    playing = false;
    document.getElementById('btnPlay').textContent = 'Play';
    document.getElementById('btnPlay').classList.remove('active');
  }
  stepGrid();
  draw();
  updateInfo();
});

document.getElementById('btnPlay').addEventListener('click', () => {
  playing = !playing;
  const btn = document.getElementById('btnPlay');
  if (playing) {
    btn.textContent = 'Pause';
    btn.classList.add('active');
    lastFrame = 0;
    animId = requestAnimationFrame(animate);
    setStatus('Running...');
  } else {
    btn.textContent = 'Play';
    btn.classList.remove('active');
    setStatus('Paused at generation ' + generation);
  }
});

document.getElementById('btnClear').addEventListener('click', () => {
  if (playing) {
    playing = false;
    document.getElementById('btnPlay').textContent = 'Play';
    document.getElementById('btnPlay').classList.remove('active');
  }
  grid = makeGrid(N);
  generation = 0;
  draw();
  updateInfo();
  setStatus('Grid cleared.');
});

document.getElementById('btnResize').addEventListener('click', () => {
  const n = parseInt(document.getElementById('selInstance').value);
  initGrid(n);
  setStatus(`Grid resized to ${n} × ${n}.`);
});

document.getElementById('speedSlider').addEventListener('input', (e) => {
  fps = parseInt(e.target.value);
  document.getElementById('speedLabel').textContent = fps + ' fps';
});

// ── Load from API ────────────────────────────────────────────

document.getElementById('btnLoad').addEventListener('click', async () => {
  const n = parseInt(document.getElementById('selInstance').value);
  const base = document.getElementById('apiUrl').value.replace(/\/+$/, '');

  setStatus(`Loading leaderboard for n=${n}...`);

  try {
    const resp = await fetch(base + '/api/v1/leaderboard', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Leaderboard-Password': 'lossfunk123',
      },
      body: JSON.stringify({
        problem_name: 'stilllife',
        instance: { n },
        k: 1,
      }),
    });

    if (!resp.ok) throw new Error(`HTTP ${resp.status}: ${resp.statusText}`);

    const data = await resp.json();

    if (!data.entries || data.entries.length === 0) {
      setStatus(`No submissions found for n=${n}.`, 'error');
      return;
    }

    const entry = data.entries[0];
    const loadedGrid = entry.submission.grid;

    if (!loadedGrid || loadedGrid.length !== n) {
      setStatus('Invalid grid data in submission.', 'error');
      return;
    }

    // Set up grid
    initGrid(n);
    for (let r = 0; r < n; r++)
      for (let c = 0; c < n; c++)
        grid[r][c] = loadedGrid[r][c];

    draw();
    updateInfo();
    const live = countLive();
    setStatus(
      `Loaded top submission by ${entry.email}: ${live} cells, score=${entry.score}` +
      (entry.is_record ? ' (RECORD)' : ''),
      'success'
    );
  } catch (err) {
    setStatus('Failed to load: ' + err.message, 'error');
  }
});

// ── Keyboard shortcuts ───────────────────────────────────────

window.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  if (e.key === ' ' || e.key === 'p') {
    e.preventDefault();
    document.getElementById('btnPlay').click();
  } else if (e.key === 's' || e.key === '.') {
    document.getElementById('btnStep').click();
  } else if (e.key === 'c') {
    document.getElementById('btnClear').click();
  }
});

// ── Init ─────────────────────────────────────────────────────

initGrid(20);
setStatus('Click cells to toggle. Space = play/pause, S = step, C = clear.');
</script>
</body>
</html>
