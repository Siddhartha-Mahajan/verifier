networks:
  verifier-net:
    name: verifier-net
    driver: bridge

volumes:
  verifier-postgres-data:

services:
  postgres:
    image: postgres:18.2
    container_name: verifier-postgres-db
    restart: unless-stopped
    networks:
      - verifier-net
    env_file:
      - ../db.env
    ports:
      - "5430:5432"
    volumes:
      - verifier-postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
  verifier:
    build:
      context: ..
      dockerfile: Dockerfile
    image: verifier:local
    container_name: verifier
    restart: unless-stopped
    networks:
      - verifier-net
    env_file:
      - ../.env
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
